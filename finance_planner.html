<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>每月收支規劃</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F7F5F0;
  --surface: #FFFFFF;
  --border: rgba(0,0,0,0.08);
  --border-med: rgba(0,0,0,0.15);
  --text: #1A1814;
  --muted: #7A776E;
  --light: #B0ADA5;
  --income: #1A6B4A;
  --income-bg: #EAF5EE;
  --expense: #B83B1E;
  --expense-bg: #FBF0EC;
  --invest: #1D4FA0;
  --invest-bg: #EBF0FB;
  --flex: #7A5200;
  --flex-bg: #FDF5E4;
  --r: 12px;
  --rs: 8px;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

header {
  background: var(--text);
  padding: 2.25rem 2.5rem 0;
}
header h1 {
  font-family: 'DM Serif Display', serif;
  font-size: 2.2rem;
  font-weight: 400;
  color: #fff;
  letter-spacing: -0.025em;
}
header p { font-size: 13px; color: rgba(255,255,255,0.45); margin-top: 5px; font-weight: 300; }

.summary-strip {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  background: var(--text);
  margin-top: 1.75rem;
  border-top: 1px solid rgba(255,255,255,0.08);
}
.sc {
  padding: 1.25rem 2rem;
  border-right: 1px solid rgba(255,255,255,0.08);
}
.sc:last-child { border-right: none; }
.sc .lb { font-size: 11px; color: rgba(255,255,255,0.4); letter-spacing: 0.09em; text-transform: uppercase; margin-bottom: 6px; }
.sc .vl { font-family: 'DM Serif Display', serif; font-size: 1.9rem; color: #fff; letter-spacing: -0.025em; transition: color 0.3s; }
.vl.g { color: #6FCFA0; }
.vl.b { color: #F0836A; }
.vl.w { color: #F5C26B; }

.main {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.25rem;
  padding: 2rem 2.5rem;
  max-width: 1080px;
  margin: 0 auto;
}

@media (max-width: 700px) {
  header { padding: 1.5rem 1.25rem 0; }
  header h1 { font-size: 1.6rem; }
  .summary-strip { grid-template-columns: 1fr; }
  .sc { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .main { grid-template-columns: 1fr; padding: 1.25rem; }
  .full { grid-column: 1; }
}

.full { grid-column: 1 / -1; }

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
}

.card-hd {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.9rem 1.25rem;
  border-bottom: 1px solid var(--border);
}
.card-title {
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--muted);
}
.add-btn {
  font-size: 12px;
  color: var(--muted);
  background: none;
  border: 1px solid var(--border-med);
  border-radius: 20px;
  padding: 3px 12px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: background 0.15s, color 0.15s;
}
.add-btn:hover { background: var(--bg); color: var(--text); }

.section-note { font-size: 11px; color: var(--light); padding: 6px 1.25rem 0; }

.items-list { padding: 0.2rem 0; min-height: 40px; }

.item-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 1.25rem;
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
}
.item-row:last-child { border-bottom: none; }
.item-row:hover { background: var(--bg); }
.item-row:hover .del-btn { opacity: 1; }

.item-name {
  flex: 1;
  font-size: 14px;
  border: none;
  background: none;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  outline: none;
  min-width: 0;
}
.item-name::placeholder { color: var(--light); }

.item-amount {
  font-size: 14px;
  font-weight: 500;
  border: none;
  background: none;
  text-align: right;
  width: 110px;
  font-family: 'DM Sans', sans-serif;
  outline: none;
}
.item-amount::placeholder { color: var(--light); }
.item-amount::-webkit-inner-spin-button,
.item-amount::-webkit-outer-spin-button { -webkit-appearance: none; }
.item-amount.ic { color: var(--income); }
.item-amount.ec { color: var(--expense); }
.item-amount.fc { color: var(--flex); }
.item-amount.vc { color: var(--invest); }

.del-btn {
  width: 20px; height: 20px;
  border: none;
  background: none;
  color: var(--light);
  cursor: pointer;
  border-radius: 50%;
  font-size: 17px;
  line-height: 1;
  display: flex; align-items: center; justify-content: center;
  opacity: 0;
  transition: opacity 0.15s, background 0.15s, color 0.15s;
  flex-shrink: 0;
}
.del-btn:hover { background: var(--expense-bg); color: var(--expense); }

.card-total {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.8rem 1.25rem;
  background: var(--bg);
  border-top: 1px solid var(--border);
}
.ct-label { font-size: 12px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
.ct-value { font-family: 'DM Serif Display', serif; font-size: 1.15rem; letter-spacing: -0.01em; }
.ct-value.ic { color: var(--income); }
.ct-value.ec { color: var(--expense); }
.ct-value.fc { color: var(--flex); }
.ct-value.vc { color: var(--invest); }

/* Analysis */
.big-block {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1.25rem 1.5rem;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}
.big-label { font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }
.big-val { font-family: 'DM Serif Display', serif; font-size: 2.25rem; letter-spacing: -0.03em; transition: color 0.3s; }
.big-val.g { color: var(--income); }
.big-val.w { color: var(--flex); }
.big-val.b { color: var(--expense); }

.rrow {
  display: flex; justify-content: space-between; align-items: center;
  padding: 11px 1.5rem;
  font-size: 14px;
  border-bottom: 1px solid var(--border);
}
.rrow:last-child { border-bottom: none; }
.rl { color: var(--muted); }
.rv { font-weight: 500; }

.bars { padding: 1rem 1.5rem; border-top: 1px solid var(--border); }
.bar-row { margin-bottom: 12px; }
.bar-row:last-child { margin-bottom: 0; }
.bm { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 5px; }
.bt { background: var(--bg); border-radius: 4px; height: 8px; overflow: hidden; border: 1px solid var(--border); }
.bf { height: 100%; border-radius: 3px; transition: width 0.4s ease; }

.msg { margin: 0 1.5rem 1.25rem; padding: 10px 14px; border-radius: var(--rs); font-size: 13px; line-height: 1.6; }
.msg.good { background: var(--income-bg); color: var(--income); }
.msg.warn { background: var(--flex-bg); color: var(--flex); }
.msg.bad { background: var(--expense-bg); color: var(--expense); }

/* Chart */
.chart-wrap { padding: 1.25rem 1.25rem 1rem; }
.canvas-wrap { position: relative; height: 200px; }
.legend { display: flex; flex-wrap: wrap; gap: 8px 14px; margin-top: 1rem; font-size: 12px; color: var(--muted); }
.legend span { display: flex; align-items: center; gap: 5px; }
.dot { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }

/* Tip card */
.tip {
  background: var(--text);
  color: rgba(255,255,255,0.8);
  border-radius: var(--r);
  padding: 1.35rem 1.5rem;
  font-size: 13px;
  line-height: 1.75;
  border: 1px solid rgba(255,255,255,0.04);
}
.tip h3 { font-family: 'DM Serif Display', serif; font-size: 1.15rem; font-weight: 400; color: #fff; margin-bottom: 0.9rem; }
.tip-line { display: flex; gap: 10px; margin-bottom: 7px; }
.tip-line::before { content: '→'; color: rgba(255,255,255,0.28); flex-shrink: 0; margin-top: 1px; }
</style>
</head>
<body>

<header>
  <h1>每月收支規劃</h1>
  <p>點擊任何名稱或金額直接編輯・按「新增」可新增項目</p>
</header>

<div class="summary-strip">
  <div class="sc"><div class="lb">總收入</div><div class="vl g" id="h-income">$0</div></div>
  <div class="sc"><div class="lb">總支出</div><div class="vl b" id="h-expense">$0</div></div>
  <div class="sc"><div class="lb">每月結餘</div><div class="vl" id="h-surplus">$0</div></div>
</div>

<div class="main">

  <div class="card">
    <div class="card-hd">
      <div class="card-title">💰 收入來源</div>
      <button class="add-btn" onclick="addItem('income')">＋ 新增</button>
    </div>
    <div class="items-list" id="income-list"></div>
    <div class="card-total"><span class="ct-label">合計</span><span class="ct-value ic" id="t-income">$0</span></div>
  </div>

  <div class="card">
    <div class="card-hd">
      <div class="card-title">🏠 固定支出</div>
      <button class="add-btn" onclick="addItem('fixed')">＋ 新增</button>
    </div>
    <div class="items-list" id="fixed-list"></div>
    <div class="card-total"><span class="ct-label">合計</span><span class="ct-value ec" id="t-fixed">$0</span></div>
  </div>

  <div class="card">
    <div class="card-hd">
      <div class="card-title">🛍️ 彈性支出</div>
      <button class="add-btn" onclick="addItem('flexible')">＋ 新增</button>
    </div>
    <div class="section-note" style="padding-bottom:6px">購物、娛樂、聚餐等不固定花費</div>
    <div class="items-list" id="flexible-list"></div>
    <div class="card-total"><span class="ct-label">合計</span><span class="ct-value fc" id="t-flexible">$0</span></div>
  </div>

  <div class="card">
    <div class="card-hd">
      <div class="card-title">📈 投資 / 儲蓄</div>
      <button class="add-btn" onclick="addItem('invest')">＋ 新增</button>
    </div>
    <div class="section-note" style="padding-bottom:6px">ETF、定存、保險等</div>
    <div class="items-list" id="invest-list"></div>
    <div class="card-total"><span class="ct-label">合計</span><span class="ct-value vc" id="t-invest">$0</span></div>
  </div>

  <!-- Analysis full width -->
  <div class="card full">
    <div class="big-block">
      <span class="big-label">每月結餘</span>
      <span class="big-val" id="big-surplus">$0</span>
    </div>
    <div id="rrows"></div>
    <div class="bars" id="bars"></div>
    <div id="msg"></div>
  </div>

  <!-- Chart -->
  <div class="card">
    <div class="card-hd"><div class="card-title">💡 支出結構</div></div>
    <div class="chart-wrap">
      <div class="canvas-wrap"><canvas id="pie" role="img" aria-label="月支出結構圓餅圖"></canvas></div>
      <div class="legend" id="pie-legend"></div>
    </div>
  </div>

  <!-- Tips -->
  <div class="tip">
    <h3 id="tip-title">財務小提示</h3>
    <div id="tip-body"><div class="tip-line">先輸入你的收入和各項支出，就會自動分析財務狀況。</div></div>
  </div>

</div>

<script>
const PC = ['#7F77DD','#EF9F27','#D4537E','#1D9E75','#378ADD','#D85A30','#5DCAA5','#888780','#E24B4A','#639922','#BA7517','#7A5200'];

const state = {
  income:   [{ id:1, name:'', amount:'' }],
  fixed:    [{ id:2, name:'', amount:'' }],
  flexible: [{ id:3, name:'', amount:'' }],
  invest:   [{ id:4, name:'', amount:'' }],
};
let nid = 10, pieChart = null;

function fmt(n) {
  if (n === 0) return '$0';
  return (n < 0 ? '-$' : '$') + Math.abs(Math.round(n)).toLocaleString();
}
function pa(v) { const n = parseFloat(String(v).replace(/,/g,'')); return isNaN(n)||n<0?0:n; }
function sum(arr) { return arr.reduce((a,i)=>a+pa(i.amount),0); }

function addItem(sec) {
  state[sec].push({ id: nid++, name:'', amount:'' });
  renderSection(sec);
  recalc();
  const list = document.getElementById(sec+'-list');
  const inputs = list.querySelectorAll('.item-name');
  if (inputs.length) inputs[inputs.length-1].focus();
}

function removeItem(sec, id) {
  if (state[sec].length <= 1) { state[sec][0].name=''; state[sec][0].amount=''; }
  else state[sec] = state[sec].filter(i=>i.id!==id);
  renderSection(sec);
  recalc();
}

const COLOR_MAP = { income:'ic', fixed:'ec', flexible:'fc', invest:'vc' };

function renderSection(sec) {
  const list = document.getElementById(sec+'-list');
  const cc = COLOR_MAP[sec];
  list.innerHTML = '';
  state[sec].forEach(item => {
    const row = document.createElement('div');
    row.className = 'item-row';

    const ni = document.createElement('input');
    ni.className = 'item-name';
    ni.placeholder = '項目名稱';
    ni.value = item.name;
    ni.addEventListener('input', e => { item.name = e.target.value; recalc(); });

    const ai = document.createElement('input');
    ai.className = 'item-amount ' + cc;
    ai.type = 'number';
    ai.placeholder = '0';
    ai.min = '0';
    ai.value = item.amount;
    ai.addEventListener('input', e => { item.amount = e.target.value; recalc(); });

    const db = document.createElement('button');
    db.className = 'del-btn';
    db.innerHTML = '×';
    db.setAttribute('aria-label','刪除');
    db.addEventListener('click', () => removeItem(sec, item.id));

    row.appendChild(ni); row.appendChild(ai); row.appendChild(db);
    list.appendChild(row);
  });
}

function recalc() {
  const ti = sum(state.income);
  const tf = sum(state.fixed);
  const tx = sum(state.flexible);
  const tv = sum(state.invest);
  const te = tf + tx + tv;
  const sur = ti - te;
  const sp = ti > 0 ? Math.round(tv/ti*100) : 0;
  const ep = ti > 0 ? Math.round(te/ti*100) : 0;

  document.getElementById('t-income').textContent = fmt(ti);
  document.getElementById('t-fixed').textContent = fmt(tf);
  document.getElementById('t-flexible').textContent = fmt(tx);
  document.getElementById('t-invest').textContent = fmt(tv);
  document.getElementById('h-income').textContent = fmt(ti);
  document.getElementById('h-expense').textContent = fmt(te);
  document.getElementById('h-surplus').textContent = fmt(sur);

  const hi = document.getElementById('h-surplus');
  hi.className = 'vl' + (sur > 0 ? ' g' : sur < 0 ? ' b' : '');

  const bg = document.getElementById('big-surplus');
  bg.textContent = fmt(sur);
  bg.className = 'big-val' + (sur > 0 ? ' g' : sur < 0 ? ' b' : sur < ti * 0.1 ? ' w' : '');

  document.getElementById('rrows').innerHTML = [
    ['總收入', fmt(ti), 'var(--income)'],
    ['固定支出', fmt(tf), 'var(--expense)'],
    ['彈性支出', fmt(tx), 'var(--flex)'],
    ['投資 / 儲蓄', fmt(tv), 'var(--invest)'],
  ].map(([l,v,c]) => `<div class="rrow"><span class="rl">${l}</span><span class="rv" style="color:${c}">${v}</span></div>`).join('');

  document.getElementById('bars').innerHTML = `
    <div class="bar-row">
      <div class="bm"><span>支出佔收入</span><span>${ep}%</span></div>
      <div class="bt"><div class="bf" style="width:${Math.min(ep,100)}%;background:${ep>90?'#D85A30':ep>70?'#BA7517':'#1D9E75'}"></div></div>
    </div>
    <div class="bar-row">
      <div class="bm"><span>投資佔收入</span><span>${sp}%</span></div>
      <div class="bt"><div class="bf" style="width:${Math.min(sp,100)}%;background:#1D4FA0"></div></div>
    </div>`;

  let msgHtml='', tipTitle='財務小提示', tips=[];
  if (ti === 0) {
    tips = ['先輸入你的收入和各項支出，就會自動分析財務狀況。'];
  } else if (sur < 0) {
    msgHtml = `<div class="msg bad">⚠️ 每月超支 ${fmt(Math.abs(sur))}，支出已超過收入。</div>`;
    tipTitle = '如何改善超支？';
    tips = ['檢視彈性支出，找出最容易削減的項目。','固定支出中有哪些訂閱可以取消或降級？','短期先暫停投資，讓現金流先轉正。'];
  } else if (sur < ti * 0.1) {
    msgHtml = `<div class="msg warn">⚡ 結餘偏低（僅佔收入 ${Math.round(sur/ti*100)}%），緩衝空間較少。</div>`;
    tipTitle = '建議方向';
    tips = ['目標：每月留住至少 10–15% 收入作緩衝。',`緊急備用金建議存到 3–6 個月支出（${fmt(te*3)}–${fmt(te*6)}）。`,'從彈性支出下手，找出非必要花費。'];
  } else {
    const maxInv = Math.max(0, ti - tf - tx - 2000);
    msgHtml = `<div class="msg good">✅ 財務狀況健康！投資最多可加到 ${fmt(maxInv)}（保留 $2,000 緩衝）。</div>`;
    tipTitle = '持續優化方向';
    tips = [`投資佔收入 15–20% 是理想目標，目前是 ${sp}%。`,`先確認緊急備用金達到 3–6 個月支出（${fmt(te*3)}–${fmt(te*6)}）。`,'結餘穩定後可考慮增加 ETF 或分散資產配置。'];
  }

  document.getElementById('msg').innerHTML = msgHtml;
  document.getElementById('tip-title').textContent = tipTitle;
  document.getElementById('tip-body').innerHTML = tips.map(t => `<div class="tip-line">${t}</div>`).join('');

  updateChart();
}

function updateChart() {
  const items = [
    ...state.fixed.map(i=>({ label: i.name||'固定支出', value: pa(i.amount) })),
    ...state.flexible.map(i=>({ label: i.name||'彈性支出', value: pa(i.amount) })),
    ...state.invest.map(i=>({ label: i.name||'投資', value: pa(i.amount) })),
  ].filter(i=>i.value>0);

  const tot = items.reduce((a,i)=>a+i.value,0);
  if (!tot) {
    if (pieChart) { pieChart.destroy(); pieChart=null; }
    document.getElementById('pie-legend').innerHTML = '<span style="color:var(--light)">尚無支出資料</span>';
    return;
  }

  if (pieChart) pieChart.destroy();
  pieChart = new Chart(document.getElementById('pie'), {
    type: 'doughnut',
    data: {
      labels: items.map(i=>i.label),
      datasets: [{ data: items.map(i=>i.value), backgroundColor: items.map((_,idx)=>PC[idx%PC.length]), borderWidth: 2, borderColor:'#fff' }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '60%',
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => ` ${ctx.label}: $${ctx.raw.toLocaleString()} (${Math.round(ctx.raw/tot*100)}%)` } }
      }
    }
  });

  document.getElementById('pie-legend').innerHTML = items.map((item,idx)=>
    `<span><span class="dot" style="background:${PC[idx%PC.length]}"></span>${item.label} ${Math.round(item.value/tot*100)}%</span>`
  ).join('');
}

['income','fixed','flexible','invest'].forEach(s => renderSection(s));
recalc();
</script>
</body>
</html>
